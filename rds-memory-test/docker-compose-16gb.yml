version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql-memory-test-16gb
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: memory_test
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3309:3306"
    volumes:
      - mysql_data_16gb:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/init.sql
    command: --innodb-buffer-pool-size=4G --innodb-log-file-size=1G --max-connections=1000
    deploy:
      resources:
        limits:
          memory: 16G
    networks:
      - db-network-16gb

  postgres:
    image: postgres:15
    container_name: postgres-memory-test-16gb
    environment:
      POSTGRES_DB: memory_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5435:5432"
    volumes:
      - postgres_data_16gb:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
    command: postgres -c shared_buffers=2GB -c work_mem=64MB -c maintenance_work_mem=1GB -c max_connections=1000
    deploy:
      resources:
        limits:
          memory: 16G
    networks:
      - db-network-16gb

volumes:
  mysql_data_16gb:
  postgres_data_16gb:

networks:
  db-network-16gb:
    driver: bridge
