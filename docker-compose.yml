version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: app/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    command: uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: app/celery_worker/Dockerfile
    volumes:
      - .:/app
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    command: celery -A app.celery_worker.worker worker --loglevel=info

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
